<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Salão Noir Élite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Nunito',sans-serif;background:#0a0a0a;height:100%;width:100%;overflow:hidden}
.phone{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:#111}
@media(min-width:480px){
  body{display:flex;align-items:center;justify-content:center}
  .phone{width:390px;height:780px;border-radius:46px;box-shadow:0 0 0 2px #c9a84c,0 50px 140px rgba(0,0,0,0.95)}
}
.status-bar{background:#0a0a0a;padding:14px 22px 8px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#c9a84c;font-weight:500;flex-shrink:0;letter-spacing:0.04em}
.wa-header{background:#0a0a0a;padding:10px 16px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid rgba(201,168,76,0.25)}
.back-btn{color:#c9a84c;font-size:24px;cursor:pointer}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#c9a84c,#f0d080,#c9a84c);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 0 0 2px rgba(201,168,76,0.4)}
.contact-info{flex:1}
.contact-name{color:#f5f0e8;font-family:'Playfair Display',serif;font-size:17px;font-weight:400;letter-spacing:0.04em}
.contact-status{color:#c9a84c;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;margin-top:1px}
.header-icons{display:flex;gap:18px;color:#c9a84c;font-size:19px}
.chat-bg{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 12px 8px;display:flex;flex-direction:column;gap:7px;-webkit-overflow-scrolling:touch;background:#111}
.chat-bg::-webkit-scrollbar{width:0}
.date-label{text-align:center;margin:4px 0 8px}
.date-label span{background:rgba(201,168,76,0.12);color:#c9a84c;font-size:10px;padding:4px 14px;border-radius:20px;letter-spacing:0.12em;text-transform:uppercase}
.bubble-wrap{display:flex;flex-direction:column;opacity:0;transform:translateY(10px);transition:opacity 0.32s ease,transform 0.32s ease}
.bubble-wrap.visible{opacity:1;transform:translateY(0)}
.bubble-wrap.bot{align-items:flex-start}
.bubble-wrap.user{align-items:flex-end}
.bubble{max-width:83%;padding:10px 14px;font-size:13.5px;line-height:1.6;word-break:break-word}
.bubble.bot{background:#1c1c1c;color:#e8e0d0;border-radius:18px 18px 18px 4px;border:1px solid rgba(201,168,76,0.2);box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.bubble.user{background:linear-gradient(135deg,#c9a84c,#b8922a);color:#0a0a0a;font-weight:600;border-radius:18px 18px 4px 18px;box-shadow:0 2px 14px rgba(201,168,76,0.3)}
.bubble-time{font-size:10px;margin-top:3px;padding:0 4px;display:flex;align-items:center;gap:3px}
.bubble-wrap.bot .bubble-time{color:#555}
.bubble-wrap.user .bubble-time{color:rgba(10,10,10,0.5);justify-content:flex-end}
.check{color:#0a0a0a;font-size:11px}
.quick-replies{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px;padding-left:2px}
.qr-btn{background:transparent;border:1px solid rgba(201,168,76,0.6);color:#c9a84c;padding:7px 15px;border-radius:20px;font-size:12.5px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:500;transition:all 0.18s;touch-action:manipulation}
.qr-btn:active,.qr-btn:hover{background:#c9a84c;color:#0a0a0a;border-color:#c9a84c}
.qr-btn:disabled{opacity:0.2;pointer-events:none}
.typing-wrap{padding:0 12px 4px;background:#111;flex-shrink:0}
.typing{display:flex;align-items:center;gap:5px;padding:11px 16px;background:#1c1c1c;border-radius:18px 18px 18px 4px;border:1px solid rgba(201,168,76,0.2);width:fit-content;opacity:0;transition:opacity 0.2s;min-height:40px}
.typing.show{opacity:1}
.typing span{width:6px;height:6px;background:#c9a84c;border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.input-bar{background:#0a0a0a;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));display:flex;align-items:center;gap:10px;border-top:1px solid rgba(201,168,76,0.2);flex-shrink:0}
.input-field{flex:1;background:#1c1c1c;border:1px solid rgba(201,168,76,0.25);border-radius:24px;padding:10px 16px;color:#e8e0d0;font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
.input-field::placeholder{color:#555}
.input-field:focus{border-color:#c9a84c}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,#c9a84c,#b8922a);border:none;border-radius:50%;color:#0a0a0a;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;box-shadow:0 2px 10px rgba(201,168,76,0.4)}
.emoji-btn{background:none;border:none;color:#555;font-size:21px;cursor:pointer;padding:4px}
b{font-weight:600}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="clk">09:00</span>
    <span>●●● WiFi 🔋</span>
  </div>
  <div class="wa-header">
    <div class="back-btn">‹</div>
    <div class="avatar">💎</div>
    <div class="contact-info">
      <div class="contact-name">Salão Noir Élite</div>
      <div class="contact-status">● online agora</div>
    </div>
    <div class="header-icons"><span>📞</span><span>⋮</span></div>
  </div>
  <div class="chat-bg" id="chat">
    <div class="date-label"><span>Hoje</span></div>
  </div>
  <div class="typing-wrap">
    <div class="typing" id="typing"><span></span><span></span><span></span></div>
  </div>
  <div class="input-bar">
    <button class="emoji-btn">😊</button>
    <input class="input-field" id="inp" placeholder="Mensagem" readonly/>
    <button class="send-btn" id="snd">➤</button>
  </div>
</div>

<script>
(function tick(){
  const n=new Date();
  document.getElementById('clk').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  setTimeout(tick,1000);
})();

const chat=document.getElementById('chat');
const typingEl=document.getElementById('typing');
const inp=document.getElementById('inp');
const snd=document.getElementById('snd');
const delay=ms=>new Promise(r=>setTimeout(r,ms));
const showT=()=>{typingEl.classList.add('show');chat.scrollTop=9e9};
const hideT=()=>typingEl.classList.remove('show');
const getTime=()=>{const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')};

function disableAllQR(){document.querySelectorAll('.qr-btn').forEach(b=>b.disabled=true)}

function addBubble(html,type,qrs=[]){
  const w=document.createElement('div');
  w.className='bubble-wrap '+type;
  const b=document.createElement('div');
  b.className='bubble '+type;
  b.innerHTML=html;
  const t=document.createElement('div');
  t.className='bubble-time';
  t.innerHTML=type==='user'?getTime()+' <span class="check">✓✓</span>':getTime();
  b.appendChild(t);
  w.appendChild(b);
  if(qrs.length){
    const d=document.createElement('div');
    d.className='quick-replies';
    qrs.forEach(q=>{
      const btn=document.createElement('button');
      btn.className='qr-btn';
      btn.textContent=q.label;
      btn.onclick=()=>{
        disableAllQR();
        handleAction(q.action);
      };
      d.appendChild(btn);
    });
    w.appendChild(d);
  }
  chat.appendChild(w);
  setTimeout(()=>w.classList.add('visible'),40);
  chat.scrollTop=9e9;
}

const addU=t=>addBubble(t,'user');

// ── CATÁLOGO ──────────────────────────────────────────────────
const cats={
  cabelo:{label:'💇 Cabelo',items:[
    {k:'corte_fem',  n:'Corte feminino',     p:45},
    {k:'corte_inf',  n:'Corte infantil',      p:25},
    {k:'franja',     n:'Franja',              p:15},
    {k:'escova',     n:'Escova lisa',         p:40},
    {k:'babyliss',   n:'Babyliss / Cachos',   p:45},
    {k:'hidratacao', n:'Hidratação capilar',  p:55},
    {k:'botox',      n:'Botox capilar',       p:80},
    {k:'coloracao',  n:'Coloração',           p:70},
    {k:'mechas',     n:'Mechas / Luzes',      p:80},
  ]},
  maos:{label:'💅 Mãos & Pés',items:[
    {k:'manicure',   n:'Manicure',            p:25},
    {k:'pedicure',   n:'Pedicure',            p:30},
    {k:'combo_mp',   n:'Manicure + Pedicure', p:50},
    {k:'gel',        n:'Unhas em gel',        p:70},
    {k:'fibra',      n:'Fibra de vidro',      p:65},
    {k:'decoracao',  n:'Decoração de unhas',  p:15},
  ]},
  sombrancelha:{label:'✨ Sobrancelha & Cílios',items:[
    {k:'design',     n:'Design de sobrancelha',p:20},
    {k:'henna',      n:'Henna de sobrancelha', p:30},
    {k:'micropig',   n:'Micropigmentação',     p:80},
    {k:'cilios',     n:'Extensão de cílios',   p:80},
  ]},
  estetica:{label:'🌿 Estética & Maquiagem',items:[
    {k:'dep_rosto',  n:'Depilação facial',    p:20},
    {k:'dep_corpo',  n:'Depilação corporal',  p:35},
    {k:'maq_comp',   n:'Maquiagem completa',  p:70},
    {k:'maq_soc',    n:'Maquiagem social',    p:55},
  ]},
};

// índice rápido k→item
const itemIdx={};
Object.values(cats).forEach(c=>c.items.forEach(i=>itemIdx[i.k]=i));

// ── ESTADO ────────────────────────────────────────────────────
let sel=[]; // serviços selecionados
const state={prof:'',day:'',time:'',nome:''};
let inputCb=null;
let fase='inicio'; // controla em qual passo estamos

// ── HELPERS ───────────────────────────────────────────────────
function resumoSel(){return sel.map(i=>`• ${i.n} — R$ ${i.p}`).join('<br>')}
function totalSel(){return sel.reduce((a,i)=>a+i.p,0)}

function mostrarCategorias(){
  addBubble(
    `Escolha a categoria 💎`+
    (sel.length?`<br><small style="color:#888">${sel.length} serviço(s) já selecionado(s)</small>`:'')
  ,'bot',[
    {label:'💇 Cabelo',              action:'cat:cabelo'},
    {label:'💅 Mãos & Pés',         action:'cat:maos'},
    {label:'✨ Sobrancelha/Cílios',  action:'cat:sombrancelha'},
    {label:'🌿 Estética/Maquiagem', action:'cat:estetica'},
    ...(sel.length?[{label:`✅ Pronto! (${sel.length} serv.)`,action:'ir_prof'}]:[]),
  ]);
  fase='categorias';
}

async function mostrarItens(catKey){
  const c=cats[catKey];
  addU(c.label);
  showT(); await delay(800); hideT();
  const qrs=c.items.map(i=>({
    label:`${i.n} — R$ ${i.p}`,
    action:'item:'+i.k,
  }));
  qrs.push({label:'⬅ Outras categorias', action:'mais_cats'});
  if(sel.length) qrs.push({label:`✅ Pronto! (${sel.length} serv.)`, action:'ir_prof'});
  addBubble(`Serviços de <b>${c.label}</b>:`,'bot',qrs);
  fase='itens';
}

async function adicionarItem(k){
  const item=itemIdx[k];
  if(!item) return;
  if(sel.find(x=>x.k===k)){
    // já tem — informa
    showT(); await delay(600); hideT();
    addBubble(`Esse serviço já está na sua lista 😊`,'bot',[
      {label:'⬅ Outras categorias', action:'mais_cats'},
      {label:`✅ Pronto! (${sel.length} serv.)`, action:'ir_prof'},
    ]);
    return;
  }
  sel.push(item);
  addU(`${item.n} — R$ ${item.p}`);
  showT(); await delay(700); hideT();
  addBubble(
    `✅ Adicionado!<br><br><b>Sua lista:</b><br>${resumoSel()}<br><br>Quer adicionar mais algum serviço?`
  ,'bot',[
    {label:'➕ Mais serviços', action:'mais_cats'},
    {label:`✅ Pronto! (${sel.length} serv.)`, action:'ir_prof'},
  ]);
}

async function irProfissional(){
  if(sel.length===0){
    showT(); await delay(600); hideT();
    addBubble(`Selecione ao menos um serviço primeiro 😊`,'bot',[
      {label:'💇 Cabelo',             action:'cat:cabelo'},
      {label:'💅 Mãos & Pés',        action:'cat:maos'},
      {label:'✨ Sobrancelha/Cílios', action:'cat:sombrancelha'},
      {label:'🌿 Estética/Maquiagem',action:'cat:estetica'},
    ]);
    return;
  }
  showT(); await delay(1000); hideT();
  addBubble(
    `💎 <b>Serviços escolhidos:</b><br>${resumoSel()}<br><br>`+
    `💰 <b>Total estimado: R$ ${totalSel()}</b><br><br>`+
    `Com qual profissional você prefere?`
  ,'bot',[
    {label:'👩 Andressa', action:'prof:Andressa'},
    {label:'👩 Bianca',   action:'prof:Bianca'},
    {label:'👩 Carla',    action:'prof:Carla'},
    {label:'😊 Sem preferência', action:'prof:Sem preferência'},
  ]);
  fase='prof';
}

async function escolherDia(prof){
  state.prof=prof;
  addU(prof==='Sem preferência'?'😊 Sem preferência':'👩 '+prof);
  showT(); await delay(1000); hideT();
  addBubble(`Que dia você prefere? 📅`,'bot',[
    {label:'Segunda (26/05)', action:'dia:Segunda (26/05)'},
    {label:'Terça (27/05)',   action:'dia:Terça (27/05)'},
    {label:'Quarta (28/05)', action:'dia:Quarta (28/05)'},
    {label:'Quinta (29/05)', action:'dia:Quinta (29/05)'},
    {label:'Sexta (30/05)',  action:'dia:Sexta (30/05)'},
    {label:'Sábado (31/05)', action:'dia:Sábado (31/05)'},
  ]);
  fase='dia';
}

async function escolherHora(dia){
  state.day=dia;
  addU(dia);
  showT(); await delay(1000); hideT();
  addBubble(`Horários disponíveis para <b>${dia}</b> ✨`,'bot',[
    {label:'08:00', action:'hora:08:00'},
    {label:'09:30', action:'hora:09:30'},
    {label:'11:00', action:'hora:11:00'},
    {label:'13:30', action:'hora:13:30'},
    {label:'15:00', action:'hora:15:00'},
    {label:'17:00', action:'hora:17:00'},
  ]);
  fase='hora';
}

async function confirmarResumo(hora){
  state.time=hora;
  addU(hora);
  showT(); await delay(1300); hideT();
  const prof=state.prof==='Sem preferência'?'Primeira disponível':state.prof;
  addBubble(
    `🖤 <b>Confirma seu agendamento?</b><br><br>`+
    `${resumoSel()}<br>`+
    `💰 Total: R$ ${totalSel()}<br><br>`+
    `👩 Profissional: ${prof}<br>`+
    `📅 ${state.day} às ${state.time}<br><br>`+
    `Está tudo certinho?`
  ,'bot',[
    {label:'✅ Confirmar!',        action:'confirmar'},
    {label:'✏️ Alterar serviços', action:'alterar'},
  ]);
  fase='confirmacao';
}

async function pedirNome(){
  showT(); await delay(800); hideT();
  addBubble(`Perfeito! 💎 Qual é o seu <b>nome completo</b>?`,'bot');
  enableInput(async nome=>{
    state.nome=nome;
    showT(); await delay(700); hideT();
    addBubble(`E seu <b>telefone</b> para contato? 📱`,'bot');
    enableInput(async fone=>{
      showT(); await delay(1500); hideT();
      const prof=state.prof==='Sem preferência'?'Primeira disponível':state.prof;
      addBubble(
        `🎉 <b>Agendamento confirmado!</b><br><br>`+
        `Olá, <b>${state.nome}</b>! Seu horário está garantido 🖤<br><br>`+
        `${resumoSel()}<br>`+
        `💰 Total: R$ ${totalSel()}<br>`+
        `👩 ${prof} | 📅 ${state.day} | ⏰ ${state.time}<br><br>`+
        `Você receberá uma confirmação em breve.<br>Te esperamos no <b>Noir Élite</b>! 💎`
      ,'bot',[
        {label:'🏠 Menu inicial', action:'inicio'},
      ]);
      fase='fim';
    });
  });
}

// ── ROTEADOR CENTRAL ─────────────────────────────────────────
async function handleAction(action){
  // voltar ao início
  if(action==='inicio'||action==='voltar'){
    sel=[];Object.assign(state,{prof:'',day:'',time:'',nome:''});
    await inicio(); return;
  }
  // mais categorias
  if(action==='mais_cats'){
    mostrarCategorias(); return;
  }
  // ir para profissional
  if(action==='ir_prof'){
    await irProfissional(); return;
  }
  // agendar (vindo do menu ou de ver serviços)
  if(action==='agendar'){
    sel=[];
    showT(); await delay(900); hideT();
    mostrarCategorias(); return;
  }
  // ver serviços
  if(action==='servicos'){
    addU('💎 Ver serviços e preços');
    showT(); await delay(1100); hideT();
    addBubble(
      `💎 <b>Tabela de serviços:</b><br><br>`+
      `<b>💇 Cabelo</b><br>`+
      `• Corte feminino — R$ 45 | Infantil — R$ 25<br>`+
      `• Franja — R$ 15 | Escova — R$ 40<br>`+
      `• Babyliss/Cachos — R$ 45 | Hidratação — R$ 55<br>`+
      `• Botox capilar — R$ 80 | Coloração — R$ 70<br>`+
      `• Mechas/Luzes — R$ 80<br><br>`+
      `<b>💅 Mãos & Pés</b><br>`+
      `• Manicure — R$ 25 | Pedicure — R$ 30<br>`+
      `• Manicure + Pedicure — R$ 50<br>`+
      `• Unhas em gel — R$ 70 | Fibra — R$ 65<br>`+
      `• Decoração — R$ 15<br><br>`+
      `<b>✨ Sobrancelha & Cílios</b><br>`+
      `• Design — R$ 20 | Henna — R$ 30<br>`+
      `• Micropigmentação — R$ 80<br>`+
      `• Extensão de cílios — R$ 80<br><br>`+
      `<b>🌿 Estética & Maquiagem</b><br>`+
      `• Depilação facial — R$ 20<br>`+
      `• Depilação corporal — R$ 35<br>`+
      `• Maquiagem completa — R$ 70<br>`+
      `• Maquiagem social — R$ 55`
    ,'bot',[
      {label:'📅 Quero agendar!', action:'agendar'},
      {label:'🔙 Voltar',          action:'voltar'},
    ]);
    return;
  }
  // local
  if(action==='local'){
    addU('📍 Endereço e horários');
    showT(); await delay(1000); hideT();
    addBubble(
      `📍 <b>Nossa localização:</b><br>Rua das Orquídeas, 88 — Centro<br><br>`+
      `⏰ <b>Horários:</b><br>Seg–Sex: 8h às 20h<br>Sábado: 8h às 18h<br>Domingo: 9h às 14h<br><br>`+
      `🅿️ Estacionamento gratuito para clientes!`
    ,'bot',[
      {label:'📅 Agendar agora', action:'agendar'},
      {label:'🔙 Voltar',        action:'voltar'},
    ]);
    return;
  }
  // atendente
  if(action==='atendente'){
    addU('💬 Falar com atendente');
    showT(); await delay(900); hideT();
    addBubble(`Uma atendente vai te responder em breve! ⏳<br>Tempo médio: <b>5 min</b>`,'bot',[
      {label:'📅 Agendar enquanto aguardo', action:'agendar'},
      {label:'🔙 Menu inicial',             action:'voltar'},
    ]);
    return;
  }
  // categoria
  if(action.startsWith('cat:')){
    await mostrarItens(action.slice(4)); return;
  }
  // item
  if(action.startsWith('item:')){
    await adicionarItem(action.slice(5)); return;
  }
  // profissional
  if(action.startsWith('prof:')){
    await escolherDia(action.slice(5)); return;
  }
  // dia
  if(action.startsWith('dia:')){
    await escolherHora(action.slice(4)); return;
  }
  // hora
  if(action.startsWith('hora:')){
    await confirmarResumo(action.slice(5)); return;
  }
  // confirmar
  if(action==='confirmar'){
    await pedirNome(); return;
  }
  // alterar
  if(action==='alterar'){
    sel=[];
    showT(); await delay(700); hideT();
    addBubble(`Vamos recomeçar! Escolha os serviços novamente 😊`,'bot');
    await delay(600);
    mostrarCategorias(); return;
  }
}

async function inicio(){
  showT(); await delay(1600); hideT();
  addBubble(
    `💎 Olá! Seja bem-vinda ao <b>Salão Noir Élite</b>!<br><br>`+
    `Sou a assistente virtual do salão. Aqui você agenda, consulta serviços e tira dúvidas pelo WhatsApp 🖤`
  ,'bot',[
    {label:'📅 Agendar horário',        action:'agendar'},
    {label:'💎 Ver serviços e preços',  action:'servicos'},
    {label:'📍 Endereço e horários',    action:'local'},
    {label:'💬 Falar com atendente',    action:'atendente'},
  ]);
  fase='inicio';
}

// input livre
function enableInput(cb){
  inp.readOnly=false;inp.placeholder='Digite aqui...';inp.focus();inputCb=cb;
}
function doSend(){
  if(!inputCb)return;
  const v=inp.value.trim();if(!v)return;
  addU(v);inp.value='';inp.readOnly=true;inp.placeholder='Mensagem';
  const cb=inputCb;inputCb=null;cb(v);
}
snd.addEventListener('click',doSend);
inp.addEventListener('keypress',e=>{if(e.key==='Enter')doSend()});

inicio();
</script>
